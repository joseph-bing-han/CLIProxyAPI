# 服务器绑定的主机/接口。默认为空（""）以绑定所有接口（IPv4 + IPv6）。
# 使用 "127.0.0.1" 或 "localhost" 将访问限制为仅限本机。
host: ""
# 服务器端口
port: 8317
# HTTPS 的 TLS 设置。启用后，服务器将使用提供的证书和密钥进行监听。
tls:
  enable: false
  cert: ""
  key: ""
# 管理 API 设置
remote-management:
# 是否允许远程（非 localhost）管理访问。
# 当为 false 时，只有 localhost 可以访问管理端点（仍需要密钥）。
  allow-remote: true
# 管理密钥。如果在此处提供明文值，它将在启动时进行哈希处理。
# 所有管理请求（即使来自 localhost）都需要此密钥。
# 留空以完全禁用管理 API（所有 /v0/management 路由返回 404）。
  secret-key: "$2a$10$J0vOWPR5./IvrR60AwRkSee9EqxX5jWirFuABFdCanwCANqYYCS9m"
# 当为 true 时，禁用捆绑的管理控制面板资源下载和 HTTP 路由。
  disable-control-panel: false
# 管理控制面板的 GitHub 仓库。接受仓库 URL 或 releases API URL。
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"
# 认证目录（支持 ~ 表示主目录）
auth-dir: "./auths"
# 用于认证的 API 密钥
# api-keys:
#   - "your-api-key-1"
#   - "your-api-key-2"
# 启用调试日志
debug: false
# 当为 true 时，禁用高开销的 HTTP 中间件功能以减少高并发下的每个请求内存使用。
commercial-mode: false
# 当为 true 时，将应用程序日志写入轮转文件而不是 stdout
logging-to-file: false
request-log: true
# logs 目录下日志文件的最大总大小（MB）。超过时，将删除最旧的日志
# 文件直到达到限制。设置为 0 以禁用。
logs-max-total-size-mb: 0
# 当为 false 时，禁用内存中的使用统计聚合
usage-statistics-enabled: true
# 代理 URL。支持 socks5/http/https 协议。示例：socks5://user:pass@192.168.1.1:1080/
proxy-url: ""
# 当为 true 时，无前缀的模型请求仅使用没有前缀的凭据（除非前缀 == 模型名称）。
force-model-prefix: false
# 请求重试次数。如果 HTTP 响应代码为 403、408、500、502、503 或 504，将进行重试。
request-retry: 3
# 在触发重试之前，冷却凭据的最大等待时间（秒）。
max-retry-interval: 30
# 配额超限行为
quota-exceeded:
  switch-project: true # 当配额超限时是否自动切换到另一个项目
  switch-preview-model: false # 当配额超限时是否自动切换到预览模型
# 当多个凭据匹配时的路由选择策略。
routing:
  strategy: "round-robin" # round-robin（默认），fill-first
# 当为 true 时，为 WebSocket API (/v1/ws) 启用认证。
ws-auth: false
# 流式传输行为（SSE 保活 + 安全引导重试）。
# streaming:
#   keepalive-seconds: 15   # 默认值：0（禁用）。<= 0 禁用保活。
#   bootstrap-retries: 1    # 默认值：0（禁用）。在发送第一个字节之前重试。

